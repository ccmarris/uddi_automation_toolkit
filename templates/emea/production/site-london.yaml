# ---------------------------------------------------------------------------
# Site template: London (EMEA Production)
# ---------------------------------------------------------------------------
site:
  name:        london
  region:      EMEA
  environment: production
  location:    "London, UK"

network:
  subnet_size: 24
  subnets:
    - name:    london-mgmt
      purpose: mgmt
      dhcp:    false
      cidr:    24

    - name:    london-lan
      purpose: user-lan
      dhcp:    true
      dhcp_start: 10
      dhcp_end:   250
      cidr:    24

    - name:    london-server
      purpose: server
      dhcp:    false
      cidr:    24

    - name:    london-dmz
      purpose: dmz
      dhcp:    false
      cidr:    24

dns:
  create_zone:         true
  create_reverse_zone: true

hosts:
  - hostname: gw01
    subnet:   london-mgmt
    comment:  "Site gateway"

  - hostname: dns01
    subnet:   london-server
    comment:  "Site DNS"

  - hostname: mon01
    subnet:   london-mgmt
    comment:  "Site monitoring"

tags:
  Owner:      network-team
  CostCentre: CC-EMEA-001
