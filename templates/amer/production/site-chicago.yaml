# ---------------------------------------------------------------------------
# Site template: Chicago (AMER Production)
# ---------------------------------------------------------------------------
site:
  name:        chicago
  region:      AMER
  environment: production
  location:    "Chicago, US"

network:
  subnet_size: 24
  subnets:
    - name:    chicago-mgmt
      purpose: mgmt
      dhcp:    false
      cidr:    24

    - name:    chicago-lan
      purpose: user-lan
      dhcp:    true
      dhcp_start: 10
      dhcp_end:   250
      cidr:    24

    - name:    chicago-server
      purpose: server
      dhcp:    false
      cidr:    24

dns:
  create_zone:         true
  create_reverse_zone: true

hosts:
  - hostname: gw01
    subnet:   chicago-mgmt
    comment:  "Site gateway"

  - hostname: dns01
    subnet:   chicago-server
    comment:  "Site DNS"

tags:
  Owner:      network-team
  CostCentre: CC-AMER-002
