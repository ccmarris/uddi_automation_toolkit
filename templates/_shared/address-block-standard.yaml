# ---------------------------------------------------------------------------
# Address-block template (standard)
#
# Creates IPAM address blocks (and optional nested children) that seed the
# pool provision_site.py later discovers by Region / Environment /
# Status=available tags.  Run with provision_block.py / decommission_block.py
# / query_block.py (or the web UI with the BLOCK template type).
# ---------------------------------------------------------------------------
type: address-block

# Logical name — stamped as tag Template=<name> on every block so the blocks
# can be found again at decommission/query time.
name: REGION-ENV-pool

# Optional — overrides INI [DEFAULTS].ip_space
# ip_space: my-ip-space

address_blocks:
  - address: 10.0.0.0
    cidr: 16
    region: EMEA              # -> tag Region   (site discovery filters on this)
    environment: production   # -> tag Environment
    status: available         # -> tag Status   (default: available)
    location: ""              # optional -> tag Location
    comment: "Regional supernet"
    tags:
      Owner: network-team
    children:                 # optional nested child blocks (recursive)
      - address: 10.0.0.0
        cidr: 18
        comment: "Production sites"

# Template-wide tags merged onto every block above
tags:
  CostCentre: CC-XXXX-000
