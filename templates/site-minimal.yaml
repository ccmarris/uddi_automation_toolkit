# ---------------------------------------------------------------------------
# Minimal site template — only mandatory fields
# ---------------------------------------------------------------------------
# ip_space, dns.parent, dns.view, subnet_size, and owner all fall back
# to the INI configuration file [DEFAULTS] section.
# ---------------------------------------------------------------------------

site:
  name:        sydney
  region:      APAC
  environment: production
  location:    "Sydney, AU"

# dns.create_zone defaults to false when omitted — add it here to enable:
# dns:
#   create_zone: true
